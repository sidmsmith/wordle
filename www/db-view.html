<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DB View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;background:#121213;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.db-hdr{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #3a3a3c;flex-shrink:0;gap:12px}
.db-back{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px 8px;touch-action:manipulation}
.db-back:hover{color:#9ca3af}
.db-title{font-size:1rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9ca3af}
.db-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px;border-bottom:1px solid #3a3a3c;flex-shrink:0}
.db-tab{background:#2a2a2c;border:1px solid #3a3a3c;color:#9ca3af;padding:8px 12px;font-size:0.68rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:4px;touch-action:manipulation}
.db-tab:hover{background:#333;color:#fff}
.db-tab.active{background:#538d4e;border-color:#538d4e;color:#fff}
.db-wrap{flex:1;overflow:auto;padding:10px}
.db-msg{text-align:center;padding:20px;color:#9ca3af;font-size:0.85rem}
.db-table-wrap{overflow:auto;max-width:100%;border:1px solid #3a3a3c;border-radius:4px}
.db-table{border-collapse:collapse;min-width:100%;font-size:0.72rem}
.db-table th,.db-table td{padding:6px 8px;text-align:left;border-bottom:1px solid #2a2a2c}
.db-table th{background:#1a1a1b;color:#9ca3af;font-weight:700;letter-spacing:0.05em;cursor:pointer;user-select:none;white-space:nowrap}
.db-table th:hover{background:#2a2a2c;color:#fff}
.db-table th.sorted{color:#538d4e}
.db-table td{color:#e5e7eb}
.db-table tr:hover td{background:#1a1a1b}
.db-table .num{text-align:right}
.db-table .json{max-width:200px;overflow:hidden;text-overflow:ellipsis}
.db-table tr[data-clickable]{cursor:pointer}
.db-table tr[data-clickable]:hover td{background:#1a2a1b}
/* ── Game modal (75% screen) ───────────────────────────────────── */
#game-modal{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,0,0.9)}
#game-modal.open{display:flex}
#game-modal-inner{background:#121213;border:1px solid #3a3a3c;border-radius:8px;width:min(95vw,420px);max-height:75vh;display:flex;flex-direction:column;overflow:hidden}
#game-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #3a3a3c;flex-shrink:0}
#game-modal-hdr span{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;color:#9ca3af;text-transform:uppercase}
#game-modal-close{background:none;border:none;color:#818384;font-size:1.1rem;cursor:pointer;padding:2px 6px;line-height:1}
#game-modal-close:hover{color:#fff}
#game-modal-board{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px}
.gv-board{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:min(280px,85vw)}
.gv-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;cursor:pointer;padding:2px;border-radius:4px;transition:background 0.15s}
.gv-row:hover{background:rgba(255,255,255,0.05)}
.gv-row.selected{background:rgba(83,141,78,0.25);outline:1px solid #538d4e}
.gv-tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:2px solid #3a3a3c;background:#121213;color:#fff;font-size:clamp(1rem,3.5vh,1.5rem);font-weight:700;text-transform:uppercase}
.gv-tile.filled{border-color:#565758}
.gv-tile.correct{background:#538d4e;border-color:#538d4e}
.gv-tile.present{background:#b59f3b;border-color:#b59f3b}
.gv-tile.absent{background:#3a3a3c;border-color:#3a3a3c}
#game-modal-words{flex-shrink:0;border-top:1px solid #3a3a3c;max-height:35vh;overflow:hidden;display:flex;flex-direction:column}
#game-modal-words-hdr{padding:8px 12px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;color:#565758;text-transform:uppercase;flex-shrink:0}
#game-modal-words-grid{overflow-y:auto;padding:8px 10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:4px}
.gv-word{background:#2a2a2c;border-radius:3px;padding:4px 2px;text-align:center;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#fff}
</style>
</head>
<body>
<div class="db-hdr">
<button class="db-back" id="db-back" aria-label="Back">&#8592;</button>
<span class="db-title">Database View</span>
</div>
<div class="db-tabs" id="db-tabs">
<button class="db-tab active" data-table="wordle_games">Wordle Games</button>
<button class="db-tab" data-table="multiplayer_rooms">Rooms</button>
<button class="db-tab" data-table="multiplayer_players">Players</button>
<button class="db-tab" data-table="multiplayer_lobby">Lobby</button>
</div>
<div class="db-wrap">
<p class="db-msg" id="db-msg">Loading...</p>
<div class="db-table-wrap" id="db-table-wrap" style="display:none">
<table class="db-table" id="db-table">
<thead id="db-thead"></thead>
<tbody id="db-tbody"></tbody>
</table>
</div>
</div>
<!-- Game replay modal -->
<div id="game-modal" role="dialog" aria-modal="true" aria-label="Game replay">
<div id="game-modal-inner">
<div id="game-modal-hdr">
<span id="game-modal-title">Game</span>
<button id="game-modal-close" aria-label="Close">&#10005;</button>
</div>
<div id="game-modal-board"></div>
<div id="game-modal-words" style="display:none">
<div id="game-modal-words-hdr">Possible words after selected guess</div>
<div id="game-modal-words-grid"></div>
</div>
</div>
</div>
<script src="words.js"></script>
<script>
// Same origin as wordle.html so DB view works in browser (file/localhost), not only WebView.
const API_ORIGIN="https://wordle-theta-red.vercel.app";
const API_BASE=`${API_ORIGIN}/api`;
const TABLES=["wordle_games","multiplayer_rooms","multiplayer_players","multiplayer_lobby"];

let currentTable="wordle_games";
let currentRows=[];
let sortCol=null;
let sortAsc=true;

document.getElementById("db-back").onclick=()=>history.back();

document.getElementById("db-tabs").onclick=e=>{
  const tab=e.target.closest(".db-tab");
  if(!tab)return;
  currentTable=tab.dataset.table;
  document.querySelectorAll(".db-tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");
  load();
};

async function load(){
  document.getElementById("db-msg").textContent="Loading...";
  document.getElementById("db-msg").style.display="block";
  document.getElementById("db-table-wrap").style.display="none";
  try{
    const r=await fetch(`${API_BASE}/wordle-db?table=${encodeURIComponent(currentTable)}`);
    if(!r.ok)throw new Error(r.statusText);
    const data=await r.json();
    currentRows=data.rows||[];
    render();
  }catch(e){
    document.getElementById("db-msg").textContent="Error: "+e.message;
    document.getElementById("db-msg").style.display="block";
    document.getElementById("db-table-wrap").style.display="none";
  }
}

function render(){
  if(currentRows.length===0){
    document.getElementById("db-msg").textContent="No rows.";
    document.getElementById("db-msg").style.display="block";
    document.getElementById("db-table-wrap").style.display="none";
    return;
  }
  let rows=[...currentRows];
  const cols=Object.keys(rows[0]);
  if(sortCol&&cols.includes(sortCol)){
    rows.sort((a,b)=>{
      const av=a[sortCol],bv=b[sortCol];
      const an=typeof av==="number"||!isNaN(parseFloat(av));
      const bn=typeof bv==="number"||!isNaN(parseFloat(bv));
      if(an&&bn){
        const diff=(parseFloat(av)||0)-(parseFloat(bv)||0);
        return sortAsc?diff:-diff;
      }
      const sa=String(av??""),sb=String(bv??"");
      return sortAsc?sa.localeCompare(sb):sb.localeCompare(sa);
    });
  }
  const thead=document.getElementById("db-thead");
  thead.innerHTML="<tr>"+cols.map(c=>`<th class="${typeof rows[0][c]==="number"?"num":""}" data-col="${c}">${c}</th>`).join("")+"</tr>";
  thead.querySelectorAll("th").forEach(th=>{
    if(th.dataset.col===sortCol)th.classList.add("sorted");
    th.onclick=()=>{
      const col=th.dataset.col;
      sortAsc=col===sortCol?!sortAsc:true;
      sortCol=col;
      render();
    };
  });
  const tbody=document.getElementById("db-tbody");
  const clickable=currentTable==="wordle_games";
  tbody.innerHTML=rows.map((r,i)=>{
    const trAttrs=clickable?` data-clickable data-row-idx="${i}"`:"";
    return "<tr"+trAttrs+">"+cols.map(c=>{
    let v=r[c];
    if(v==null)v="";
    else if(typeof v==="object")v=JSON.stringify(v);
    else if(typeof v==="string"&&v.length>80)v=v.slice(0,80)+"...";
    const cls=typeof r[c]==="number"?"num":(typeof v==="string"&&v.startsWith("{")?"json":"");
    return `<td class="${cls}" title="${String(v).replace(/"/g,"&quot;")}">${escapeHtml(String(v))}</td>`;
  }).join("")+"</tr>";
  }).join("");
  if(clickable){
    tbody.querySelectorAll("tr[data-clickable]").forEach(tr=>{
      tr.onclick=()=>openGameModal(rows[parseInt(tr.dataset.rowIdx,10)]);
    });
  }
  document.getElementById("db-msg").style.display="none";
  document.getElementById("db-table-wrap").style.display="block";
}

function escapeHtml(s){
  const d=document.createElement("div");
  d.textContent=s;
  return d.innerHTML;
}

const WORD_LENGTH=5;
let modalGame=null;
let selectedRowIdx=-1;

function getTileState(guess,target){
  const states=Array(WORD_LENGTH).fill("absent");
  const targetCounts={},guessCounts={};
  for(let i=0;i<WORD_LENGTH;i++){
    if(guess[i]===target[i])states[i]="correct";
    targetCounts[target[i]]=(targetCounts[target[i]]||0)+1;
  }
  for(let i=0;i<WORD_LENGTH;i++){
    if(states[i]==="correct")guessCounts[guess[i]]=(guessCounts[guess[i]]||0)+1;
  }
  for(let i=0;i<WORD_LENGTH;i++){
    if(states[i]!=="correct"){
      const letter=guess[i];
      const tc=targetCounts[letter]||0,gc=guessCounts[letter]||0;
      if(target.includes(letter)&&gc<tc){states[i]="present";guessCounts[letter]=(guessCounts[letter]||0)+1;}
    }
  }
  return states;
}

function getRemainingWords(guessHistory){
  if(typeof WORDS==="undefined")return [];
  if(!guessHistory.length)return WORDS.slice();
  return WORDS.filter(word=>{
    for(const {guess,states} of guessHistory){
      const minCounts={},hasAbsent={};
      for(let i=0;i<WORD_LENGTH;i++){
        const c=guess[i];
        if(states[i]==="correct"||states[i]==="present")minCounts[c]=(minCounts[c]||0)+1;
        else hasAbsent[c]=true;
      }
      for(const c of new Set(guess)){
        const min=minCounts[c]||0;
        const cnt=word.split("").filter(l=>l===c).length;
        if(cnt<min)return false;
        if(hasAbsent[c]&&cnt>min)return false;
      }
      for(let i=0;i<WORD_LENGTH;i++){
        if(states[i]==="correct"&&word[i]!==guess[i])return false;
        if(states[i]==="present"&&word[i]===guess[i])return false;
      }
    }
    return true;
  });
}

function openGameModal(row){
  const guesses=Array.isArray(row.guesses_json)?row.guesses_json:(typeof row.guesses_json==="string"?JSON.parse(row.guesses_json||"[]"):[]);
  const target=(row.target_word||"").toLowerCase();
  if(!target||target.length!==WORD_LENGTH){
    alert("Invalid game data (missing target_word)");
    return;
  }
  modalGame={target,guesses};
  selectedRowIdx=-1;
  document.getElementById("game-modal-title").textContent=`Game #${row.id||"?"} · ${row.username||"?"}`;
  renderGameBoard();
  document.getElementById("game-modal-words").style.display="none";
  document.getElementById("game-modal").classList.add("open");
}

function renderGameBoard(){
  const board=document.getElementById("game-modal-board");
  board.innerHTML="";
  const {target,guesses}=modalGame;
  const history=[];
  for(let ri=0;ri<6;ri++){
    const rowEl=document.createElement("div");
    rowEl.className="gv-row"+(selectedRowIdx===ri?" selected":"");
    rowEl.dataset.rowIdx=String(ri);
    rowEl.onclick=()=>{
      selectedRowIdx=selectedRowIdx===ri?-1:ri;
      document.querySelectorAll("#game-modal-board .gv-row").forEach(r=>{
        r.classList.toggle("selected",parseInt(r.dataset.rowIdx,10)===selectedRowIdx);
      });
      updatePossibleWords();
    };
    const guess=guesses[ri]?(guesses[ri]+"").toLowerCase():"";
    const states=guess?getTileState(guess,target):null;
    if(guess)history.push({guess,states});
    for(let ci=0;ci<5;ci++){
      const tile=document.createElement("div");
      tile.className="gv-tile"+(guess?" filled "+(states[ci]||""):"");
      tile.textContent=guess?guess[ci].toUpperCase():"";
      rowEl.appendChild(tile);
    }
    board.appendChild(rowEl);
  }
}

function updatePossibleWords(){
  const panel=document.getElementById("game-modal-words");
  const hdr=document.getElementById("game-modal-words-hdr");
  const grid=document.getElementById("game-modal-words-grid");
  if(selectedRowIdx<0){
    panel.style.display="none";
    return;
  }
  const {target,guesses}=modalGame;
  const history=[];
  for(let i=0;i<=selectedRowIdx&&i<guesses.length;i++){
    const g=(guesses[i]+"").toLowerCase();
    if(g.length===5)history.push({guess:g,states:getTileState(g,target)});
  }
  const words=getRemainingWords(history);
  hdr.textContent=typeof WORDS==="undefined"?"Run build:web to enable possible words":"Possible words after guess "+(selectedRowIdx+1)+" ("+words.length+")";
  grid.innerHTML="";
  words.slice(0,500).forEach(w=>{
    const el=document.createElement("div");
    el.className="gv-word";
    el.textContent=w;
    grid.appendChild(el);
  });
  if(words.length>500)grid.innerHTML+="<div class=\"gv-word\" style=\"grid-column:1/-1;color:#9ca3af\">... and "+(words.length-500)+" more</div>";
  panel.style.display="flex";
}

document.getElementById("game-modal-close").onclick=closeGameModal;
document.getElementById("game-modal").onclick=e=>{if(e.target.id==="game-modal")closeGameModal();};

function closeGameModal(){
  document.getElementById("game-modal").classList.remove("open");
  modalGame=null;
}

load();
</script>
</body>
</html>
